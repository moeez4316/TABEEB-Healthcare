# TABEEB Healthcare — Pre-built images for Oracle Cloud deployment
# No building required on the VM — just pull and run!
#
# Usage:
#   docker compose -f docker-compose.prebuilt.yml pull
#   docker compose -f docker-compose.prebuilt.yml up -d

services:
  redis:
    image: redis:7.2-alpine
    container_name: tabeeb_redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-tabeeb_redis_password}
      - --appendonly
      - yes
      - --appendfsync
      - everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - tabeeb_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-tabeeb_redis_password}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: hammadhafeez1100/tabeeb-backend:latest
    container_name: tabeeb_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-5002}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - "BOOTSTRAP_SUPERADMIN_USERNAME=${BOOTSTRAP_SUPERADMIN_USERNAME:-Hammad.Hafeez}"
      - "BOOTSTRAP_SUPERADMIN_DISPLAY_NAME=${BOOTSTRAP_SUPERADMIN_DISPLAY_NAME:-Hammad Hafeez}"
      - "BOOTSTRAP_SUPERADMIN_EMAIL=${BOOTSTRAP_SUPERADMIN_EMAIL:-hammad.hafeez@tabeebemail.me}"
      - "BOOTSTRAP_SUPERADMIN_PASSWORD=${BOOTSTRAP_SUPERADMIN_PASSWORD}"
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - REDIS_URL=${REDIS_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WS_PATH=${WS_PATH}
      - WS_CORS_ORIGIN=${WS_CORS_ORIGIN}
      - WS_PING_INTERVAL_MS=${WS_PING_INTERVAL_MS}
      - WS_PING_TIMEOUT_MS=${WS_PING_TIMEOUT_MS}
      - REALTIME_EVENT_SCHEMA_VERSION=${REALTIME_EVENT_SCHEMA_VERSION}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - JITSI_APP_ID=${JITSI_APP_ID}
      - JITSI_APP_SECRET=${JITSI_APP_SECRET}
      - JITSI_DOMAIN=${JITSI_DOMAIN}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - RESEND_REPLY_TO=${RESEND_REPLY_TO}
      - RESEND_DOMAIN=${RESEND_DOMAIN}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - SITE_ADDRESS=${SITE_ADDRESS}
    ports:
      - "5002:5002"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    networks:
      - tabeeb_network
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: hammadhafeez1100/tabeeb-frontend:latest
    container_name: tabeeb_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "3000:3000"
    networks:
      - tabeeb_network
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 768M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    container_name: tabeeb_nginx
    restart: unless-stopped
    environment:
      - SITE_ADDRESS=${SITE_ADDRESS:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    networks:
      - tabeeb_network
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 192M

  certbot:
    image: certbot/certbot:latest
    container_name: tabeeb_certbot
    restart: "no"
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    networks:
      - tabeeb_network
    depends_on:
      - nginx
    profiles:
      - tools

networks:
  tabeeb_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
